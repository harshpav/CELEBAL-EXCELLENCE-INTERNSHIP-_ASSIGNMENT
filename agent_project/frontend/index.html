<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧠 Agent Pipeline</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 14px 28px;
      border-bottom: 1px solid #2d2d4e;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    header h1 { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; }
    header .subtitle { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    .header-info { display: flex; flex-direction: column; }

    .badges { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

    .badge {
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-calc { background: #1e3a5f; color: #60a5fa; border: 1px solid #2d5a8e; }
    .badge-kw   { background: #1a3a2a; color: #34d399; border: 1px solid #2d6a4a; }
    .badge-gen  { background: #2a1a3a; color: #a78bfa; border: 1px solid #5a3a8e; }

    /* ── Chat ── */
    .chat-container {
      width: 100%;
      max-width: 800px;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { display: flex; flex-direction: column; max-width: 78%; gap: 5px; }
    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 0.93rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user  .bubble {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 2px 8px rgba(109,40,217,0.3);
    }

    .message.agent .bubble {
      background: #1e1e36;
      color: #e2e8f0;
      border-bottom-left-radius: 5px;
      border: 1px solid #2d2d4e;
    }

    .type-tag {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .tag-calculation { background: #1e3a5f; color: #60a5fa; }
    .tag-keywords    { background: #1a3a2a; color: #34d399; }
    .tag-general     { background: #2a1a3a; color: #a78bfa; }
    .tag-error       { background: #3a1a1a; color: #f87171; }

    /* Keywords chips */
    .keywords-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
    .keyword-chip {
      background: #2d3748;
      color: #a78bfa;
      padding: 3px 12px;
      border-radius: 14px;
      font-size: 0.82rem;
      border: 1px solid #4a3a6a;
    }

    /* Typing dots */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .dot {
      width: 7px; height: 7px;
      background: #7c3aed;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
      40%            { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Empty State ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #4a5568;
      text-align: center;
      padding: 20px;
    }
    .empty-state .icon { font-size: 3.5rem; }
    .empty-state h2 { font-size: 1.1rem; color: #94a3b8; font-weight: 600; }
    .empty-state p { font-size: 0.85rem; line-height: 1.7; max-width: 400px; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }
    .suggestion {
      background: #1e1e36;
      border: 1px solid #3d3d6e;
      color: #a78bfa;
      padding: 7px 16px;
      border-radius: 18px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover { background: #2d2d50; border-color: #7c3aed; color: #c4b5fd; }

    /* ── Input ── */
    .input-area {
      width: 100%;
      max-width: 800px;
      padding: 14px 20px 18px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      gap: 10px;
      background: #0d0d1a;
    }

    .input-area input {
      flex: 1;
      background: #1e1e36;
      border: 1px solid #3d3d6e;
      border-radius: 26px;
      padding: 12px 22px;
      color: #e2e8f0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .input-area input::placeholder { color: #4a5568; }
    .input-area input:disabled { opacity: 0.5; }

    .send-btn {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 50%;
      width: 48px; height: 48px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(109,40,217,0.3);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 4px 14px rgba(109,40,217,0.5); }
    .send-btn:disabled { background: #2d2d4e; cursor: not-allowed; box-shadow: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3d3d6e; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  const SUGGESTIONS = [
    "Calculate 25 * 4",
    "Calculate (100 + 50) / 3",
    "Extract keywords from deep learning is revolutionizing AI",
    "What is machine learning?",
    "Who invented Python?",
    "What is a neural network?",
  ];

  function tagClass(type) {
    return { calculation: "tag-calculation", keywords: "tag-keywords", general: "tag-general", error: "tag-error" }[type] || "tag-general";
  }

  function AgentBubble({ response }) {
    if (response.type === "keywords" && Array.isArray(response.result)) {
      return (
        <div>
          <p>Found <strong>{response.result.length}</strong> keyword{response.result.length !== 1 ? "s" : ""}:</p>
          <div className="keywords-list">
            {response.result.map((kw, i) => <span key={i} className="keyword-chip">{kw}</span>)}
          </div>
        </div>
      );
    }
    return <p>{response.result}</p>;
  }

  function App() {
    const [messages, setMessages] = useState([]);
    const [input, setInput]       = useState("");
    const [loading, setLoading]   = useState(false);
    const bottomRef               = useRef(null);

    useEffect(() => {
      bottomRef.current?.scrollIntoView({ behavior: "smooth" });
    }, [messages, loading]);

    async function sendMessage(text) {
      const query = (text || input).trim();
      if (!query || loading) return;
      setInput("");
      setMessages(prev => [...prev, { role: "user", text: query }]);
      setLoading(true);

      try {
        const res = await fetch("http://localhost:5000/api/agent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        setMessages(prev => [...prev, { role: "agent", response: data }]);
      } catch {
        setMessages(prev => [...prev, {
          role: "agent",
          response: { type: "error", result: "Cannot connect to backend. Make sure app.py is running." }
        }]);
      } finally {
        setLoading(false);
      }
    }

    return (
      <>
        <header>
          <span style={{fontSize:"1.8rem"}}>🧠</span>
          <div className="header-info">
            <h1>Single Agent Pipeline</h1>
            <div className="subtitle">Rule-based Agent · Calculator · Keywords · General</div>
          </div>
          <div className="badges">
            <span className="badge badge-calc">⚡ Calculator</span>
            <span className="badge badge-kw">🔑 Keywords</span>
            <span className="badge badge-gen">💬 General</span>
          </div>
        </header>

        <div className="chat-container">
          {messages.length === 0 && !loading ? (
            <div className="empty-state">
              <div className="icon">🤖</div>
              <h2>What can I help you with?</h2>
              <p>I can solve math, extract keywords, or answer general questions using local AI (Ollama llama3).</p>
              <div className="suggestions">
                {SUGGESTIONS.map((s, i) => (
                  <button key={i} className="suggestion" onClick={() => sendMessage(s)}>{s}</button>
                ))}
              </div>
            </div>
          ) : (
            <>
              {messages.map((msg, i) => (
                <div key={i} className={`message ${msg.role}`}>
                  {msg.role === "user" ? (
                    <div className="bubble">{msg.text}</div>
                  ) : (
                    <>
                      <span className={`type-tag ${tagClass(msg.response.type)}`}>{msg.response.type}</span>
                      <div className="bubble"><AgentBubble response={msg.response} /></div>
                    </>
                  )}
                </div>
              ))}
              {loading && (
                <div className="message agent">
                  <span className="type-tag tag-general">thinking</span>
                  <div className="bubble">
                    <div className="typing">
                      <div className="dot"/><div className="dot"/><div className="dot"/>
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
          <div ref={bottomRef}/>
        </div>

        <div className="input-area">
          <input
            type="text"
            placeholder='Try "Calculate 20 + 5", "Extract keywords from...", or ask anything'
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }}}
            disabled={loading}
            autoFocus
          />
          <button className="send-btn" onClick={() => sendMessage()} disabled={loading || !input.trim()}>➤</button>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
