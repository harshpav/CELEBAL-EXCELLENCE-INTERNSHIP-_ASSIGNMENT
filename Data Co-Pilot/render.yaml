services:
  - type: web
    name: data-copilot-backend
    runtime: python
    rootDir: .
    buildCommand: |
      cd frontend && npm install && npm run build && cd ..
      pip install -r requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: GROQ_API_KEY
        sync: false        # you'll paste this in Render dashboard
    autoDeploy: true
